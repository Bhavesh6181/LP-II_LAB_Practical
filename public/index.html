<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Registerd Users</h1>
    </header>
    
    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>name</th>
                    <th>email</th>
                    <th>city</th>
                    <th>role</th>
                </tr>
            </thead>
            <tbody id="userTable"></tbody>
        </table>
    </div>

    <script>
        fetch("/api/users")
        .then(res => res.json())
        .then(users => {
            const tbody = document.getElementById("userTable");
            users.forEach((u , i) => {
                tbody.innerHTML += `
                
                <tr>

                    <td>${ i + 1}</td>
                    <td>${ u.name }</td>
                    <td>${ u.email }</td>
                    <td>${ u.city }</td>
                    <td>${ u.role }</td>

                <tr/>         
                `
            })
        })
    </script>
</body>
</html>
